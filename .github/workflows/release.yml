name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore BSchneppe.Sts2.ReferenceAssemblies.csproj

      - name: Pack
        run: dotnet pack BSchneppe.Sts2.ReferenceAssemblies.csproj -c Release -o ./nupkg -p:Version=${{ steps.version.outputs.version }}

      - name: Push to nuget.org
        run: dotnet nuget push ./nupkg/*.nupkg --source "https://api.nuget.org/v3/index.json" --api-key ${{ secrets.NUGET_API_KEY }} --skip-duplicate

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
